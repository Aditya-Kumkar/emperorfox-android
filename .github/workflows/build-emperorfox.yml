name: Compile EmperorFox

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # We added 'working-directory' here to point to the fenix folder
      - name: Grant Execute Permission to Gradle
        working-directory: ./fenix
        run: chmod +x ./gradlew

      # We added it here too so it compiles the right app
      - name: Compile EmperorFox APK
        working-directory: ./fenix
        run: ./gradlew app:assembleDebug

      # Notice the path changed to fenix/app/build/...
      - name: Upload EmperorFox APK
        uses: actions/upload-artifact@v4
        with:
          name: EmperorFox-Android
          path: fenix/app/build/outputs/apk/debug/*.apk
