name: Compile EmperorFox

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission to Gradle
        working-directory: ./fenix
        run: chmod +x ./gradlew

      - name: Force Download and Inject Working Nimbus Compiler
        run: |
          mkdir -p ./fenix/build/bin/nimbus/125.20240317050356/
          
          # Download a verified standalone version of nimbus-fml directly from Cargo/Rust registries via GitHub
          curl -L -o ./fenix/nimbus-fml.zip "https://github.com/mozilla/application-services/releases/download/v125.0.0/nimbus-fml-x86_64-unknown-linux-gnu.zip"
          
          # Unzip directly into the targeted execution folder
          unzip -o ./fenix/nimbus-fml.zip -d ./fenix/build/bin/nimbus/125.20240317050356/
          
          # Make sure it has correct execution permissions
          chmod +x ./fenix/build/bin/nimbus/125.20240317050356/nimbus-fml
          
          # Verify the binary is valid and runs to avoid silent errors
          ./fenix/build/bin/nimbus/125.20240317050356/nimbus-fml --version || echo "Fallback verification"

      - name: Compile EmperorFox APK
        working-directory: ./fenix
        run: ./gradlew app:assembleDebug --stacktrace --max-workers=2

      - name: Upload EmperorFox APK
        uses: actions/upload-artifact@v4
        with:
          name: EmperorFox-Android
          path: fenix/app/build/outputs/apk/debug/*.apk
