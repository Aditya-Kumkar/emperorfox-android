name: Compile EmperorFox

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission to Gradle
        working-directory: ./fenix
        run: chmod +x ./gradlew

      - name: Compile EmperorFox APK
        working-directory: ./fenix
        run: |
          for attempt in {1..3}; do
            echo "Build attempt $attempt"
            if ./gradlew app:assembleDebug --stacktrace --max-workers=2; then
              break
            elif [ $attempt -lt 3 ]; then
              echo "Build failed, retrying in 10 seconds..."
              sleep 10
            else
              echo "Build failed after 3 attempts"
              exit 1
            fi
          done

      - name: Upload EmperorFox APK
        uses: actions/upload-artifact@v4
        with:
          name: EmperorFox-Android
          path: fenix/app/build/outputs/apk/debug/*.apk
